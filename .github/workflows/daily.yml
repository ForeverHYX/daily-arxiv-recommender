name: Daily Paper Recommender

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SITE_BASE_URL: https://foreverhyx.github.io/daily-arxiv-recommender
  HAS_SMTP: ${{ secrets.SMTP_HOST != '' && secrets.SMTP_PASSWORD != '' && secrets.EMAIL_SENDER != '' && secrets.EMAIL_RECEIVER != '' }}
  HAS_SUPABASE: ${{ vars.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Initialize feedback file
        run: |
          mkdir -p output
          echo '[]' > output/feedback.json

      - name: Fetch Supabase feedback
        if: env.HAS_SUPABASE == 'true'
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m paper_recommender.feedback --output output/feedback.json --limit 500

      - name: Build recommendation payload
        run: |
          python -m paper_recommender.pipeline \
            --input examples/sample_papers.jsonl \
            --profile config/interests.json \
            --feedback output/feedback.json \
            --output site/recommendations.json \
            --run-date "$(date -u +%F)" \
            --limit 25

      - name: Inject public feedback config
        run: |
          cat > site/config.js <<'EOF'
          window.RECOMMENDER_CONFIG = {
            supabaseUrl: "${{ vars.SUPABASE_URL }}",
            supabaseAnonKey: "${{ vars.SUPABASE_ANON_KEY }}",
          };
          EOF

      - name: Send email digest
        if: env.HAS_SMTP == 'true'
        env:
          SITE_BASE_URL: ${{ env.SITE_BASE_URL }}
          FEEDBACK_BASE_URL: ${{ env.SITE_BASE_URL }}/feedback.html
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python -m paper_recommender.email_delivery --recommendations site/recommendations.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
